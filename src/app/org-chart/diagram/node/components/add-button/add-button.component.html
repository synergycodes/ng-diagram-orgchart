<button
  class="add-btn"
  animate.leave="add-btn--leaving"
  [class.add-btn--left]="position() === 'left'"
  [class.add-btn--right]="position() === 'right'"
  [class.add-btn--bottom]="position() === 'bottom'"
  [disabled]="isDisabled()"
  (pointerdown)="$event.stopPropagation()"
  (click)="onAdd($event)"
  data-no-drag="true"
  data-no-pan="true"
>
  <span class="add-btn__icon"></span>
</button>
