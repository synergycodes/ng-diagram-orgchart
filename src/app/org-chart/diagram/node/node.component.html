@switch (variant()) {
  @case ('vacant') {
    <app-vacant-node [role]="node().data.role" />
  }
  @case ('compact') {
    @let data = occupiedData();
    <app-compact-node
      [fullName]="data?.fullName"
      [role]="data?.role"
      [color]="data?.color"
    />
  }
  @case ('full') {
    @let data = occupiedData();
    <app-full-node
      [fullName]="data?.fullName"
      [role]="data?.role"
      [color]="data?.color"
      [reports]="data?.reports"
      [span]="data?.span"
      [shiftCapacity]="data?.shiftCapacity"
    />
  }
}

@if (hasChildren()) {
  <app-toggle-expand-button
    [isCollapsed]="!!isCollapsed()"
    [collapsedChildrenCount]="collapsedChildrenCount()"
    [horizontal]="isHorizontal()"
    [disabled]="!isLayoutIdle()"
    (toggle)="onToggle($event)"
  />
}

@if (showIndicators()) {
  <div
    class="drop-indicator drop-indicator--left"
    [class.drop-indicator--visible]="isInDropRange() && !hiddenSides().left"
    [class.drop-indicator--highlighted]="highlightedSide() === 'left'"
  ></div>
  <div
    class="drop-indicator drop-indicator--right"
    [class.drop-indicator--visible]="isInDropRange() && !hiddenSides().right"
    [class.drop-indicator--highlighted]="highlightedSide() === 'right'"
  ></div>
  <div
    class="drop-indicator drop-indicator--bottom"
    [class.drop-indicator--visible]="isInDropRange() && !hiddenSides().bottom"
    [class.drop-indicator--highlighted]="highlightedSide() === 'bottom'"
    [class.drop-indicator--no-toggle]="!hasChildren()"
  ></div>
}

@if (showAddButtonsDom()) {
  @if (!isRoot()) {
    <app-add-button
  
      position="left"
      [horizontal]="isHorizontal()"
      [disabled]="isAddButtonDisabled()"
      (add)="onAddLeft($event)"
    />
    <app-add-button
  
      position="right"
      [horizontal]="isHorizontal()"
      [disabled]="isAddButtonDisabled()"
      (add)="onAddRight($event)"
    />
  }
  <app-add-button

    position="bottom"
    [horizontal]="isHorizontal()"
    [disabled]="isAddButtonDisabled()"
    (add)="onAddBottom($event)"
  />
  <div class="hover-zone" data-no-drag="true"></div>
}

<!-- Connection ports: incoming edge port and outgoing edge port. -->
@if (isHorizontal()) {
  <ng-diagram-port id="port-in" type="both" side="left" />
  <ng-diagram-port id="port-out" type="both" side="right" />
} @else {
  <ng-diagram-port id="port-in" type="both" side="top" />
  <ng-diagram-port id="port-out" type="both" side="bottom" />
}
