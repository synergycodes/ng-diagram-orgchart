@switch (variant()) {
  @case ('vacant') {
    <app-vacant-node [role]="node().data.role" />
  }
  @case ('compact') {
    <app-compact-node
      [fullName]="occupiedData()?.fullName"
      [role]="occupiedData()?.role"
      [color]="occupiedData()?.color"
    />
  }
  @case ('full') {
    <app-full-node
      [fullName]="occupiedData()?.fullName"
      [role]="occupiedData()?.role"
      [color]="occupiedData()?.color"
      [reports]="occupiedData()?.reports"
      [span]="occupiedData()?.span"
      [shiftCapacity]="occupiedData()?.shiftCapacity"
    />
  }
}

@if (node().data.hasChildren) {
  <app-toggle-expand-button
    [isCollapsed]="!!node().data.isCollapsed"
    [collapsedChildrenCount]="node().data.collapsedChildrenCount"
    [horizontal]="isHorizontal()"
    [disabled]="!isLayoutIdle()"
    (toggle)="onToggle($event)"
  />
}

<div
  class="drop-indicator drop-indicator--left"
  [class.drop-indicator--visible]="showLeftIndicator()"
  [class.drop-indicator--highlighted]="highlightedSide() === 'left'"
></div>
<div
  class="drop-indicator drop-indicator--right"
  [class.drop-indicator--visible]="showRightIndicator()"
  [class.drop-indicator--highlighted]="highlightedSide() === 'right'"
></div>
<div
  class="drop-indicator drop-indicator--bottom"
  [class.drop-indicator--visible]="showBottomIndicator()"
  [class.drop-indicator--highlighted]="highlightedSide() === 'bottom'"
  [class.drop-indicator--no-toggle]="!node().data.hasChildren"
></div>

@if (showAddButtons()) {
  @if (!isRoot()) {
    <app-add-button position="left" [horizontal]="isHorizontal()" (add)="onAddLeft($event)" />
    <app-add-button position="right" [horizontal]="isHorizontal()" (add)="onAddRight($event)" />
  }
  <app-add-button position="bottom" [horizontal]="isHorizontal()" (add)="onAddBottom($event)" />

  <!-- Invisible hover zone so "+" buttons outside the node boundary remain reachable. -->
  <div class="hover-zone" data-no-drag="true"></div>
}

<!-- Connection ports: incoming edge port and outgoing edge port. -->
@if (isHorizontal()) {
  <ng-diagram-port id="port-in" type="both" side="left" />
  <ng-diagram-port id="port-out" type="both" side="right" />
} @else {
  <ng-diagram-port id="port-in" type="both" side="top" />
  <ng-diagram-port id="port-out" type="both" side="bottom" />
}
