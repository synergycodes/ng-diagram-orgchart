<app-diagram #diagram />
<div class="ui-overlay">
  <app-top-navbar class="top-navbar" />
  <div class="top-toolbar-wrapper">
    <app-toolbar-horizontal
      class="top-toolbar"
      [direction]="diagram.direction()"
      [disabled]="!diagram.isLayoutIdle()"
      (directionChange)="diagram.changeDirection($event)"
    />
  </div>
  <div class="content-area">
    <app-properties-sidebar />
    <app-minimap-panel />
  </div>
</div>
