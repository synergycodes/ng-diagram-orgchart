<aside
  class="sidebar"
  aria-labelledby="properties-sidebar-title"
  [class.expanded]="sidebarExpanded()"
>
  <app-sidebar-header [isExpanded]="isExpanded()" (toggle)="onHeaderToggle()" />
  <div class="sidebar-separator" [class.visible]="sidebarExpanded()"></div>
  @if (isExpanded()) {
    <div class="sidebar-content" animate.enter="sidebar-enter" animate.leave="sidebar-leave">
      @if (state() === 'single') {
        <app-sidebar-form
          [reportsToCandidateNodes]="reportsToCandidateNodes()"
          [roleOptions]="roleOptions"
        />
      } @else {
        <div
          class="placeholder-wrapper"
          [class.placeholder-enter]="shouldAnimatePlaceholder()"
          (animationend)="onPlaceholderAnimationEnd()"
        >
          @if (state() === 'empty') {
            <app-sidebar-placeholder
              title="No selection"
              description="Select an employee card on the canvas to view their details."
            />
          } @else {
            <app-sidebar-placeholder
              title="Multiple items selected."
              description="Please select a single node to view properties."
            />
          }
        </div>
      }
    </div>
  }
</aside>
