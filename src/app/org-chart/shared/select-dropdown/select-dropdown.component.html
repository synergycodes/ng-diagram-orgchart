<div class="dropdown">
  <button
    class="dropdown-trigger p10"
    type="button"
    role="combobox"
    [attr.id]="triggerId()"
    [attr.aria-expanded]="isOpen()"
    [attr.disabled]="disabled() || null"
    [attr.aria-disabled]="disabled()"
    aria-haspopup="listbox"
    (click)="toggleOpen()"
    (keydown)="onKeydown($event)"
  >
    @if (selectedOption(); as opt) {
      @if (optionTpl(); as tpl) {
        <ng-container *ngTemplateOutlet="tpl.templateRef; context: { $implicit: opt }" />
      } @else {
        <span class="option-label">{{ opt.label }}</span>
      }
    } @else {
      @if (nullOptionTpl(); as tpl) {
        <ng-container *ngTemplateOutlet="tpl.templateRef" />
      } @else {
        <span class="option-label placeholder">{{ placeholder() }}</span>
      }
    }
    <span class="caret-icon" aria-hidden="true"></span>
  </button>

  @if (isOpen()) {
    <div class="dropdown-panel" role="listbox">
      <div
        #optionEl
        class="dropdown-option p10"
        role="option"
        [attr.aria-selected]="value() == null"
        [class.selected]="value() == null"
        [class.focused]="focusedIndex() === 0"
        (click)="select(null)"
      >
        @if (nullOptionTpl(); as tpl) {
          <ng-container *ngTemplateOutlet="tpl.templateRef" />
        } @else {
          <span class="option-label placeholder">{{ placeholder() }}</span>
        }
      </div>

      @for (opt of options(); track opt.value; let i = $index) {
        <div
          #optionEl
          class="dropdown-option p10"
          role="option"
          [class.selected]="opt.value === value()"
          [class.focused]="focusedIndex() === i + 1"
          [attr.aria-selected]="opt.value === value()"
          (click)="select(opt)"
        >
          @if (optionTpl(); as tpl) {
            <ng-container *ngTemplateOutlet="tpl.templateRef; context: { $implicit: opt }" />
          } @else {
            <span class="option-label">{{ opt.label }}</span>
          }
        </div>
      }
    </div>
  }
</div>
